<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Login Form -->
    <div class="form-card">
        <h2>Login</h2>
        <form>
            <label for="login-username">Username</label>
            <input type="text" id="login-username" placeholder="Enter username" required>

            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Registration Form -->
    <div class="form-card">
        <h2>Register</h2>
        <form>
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" placeholder="Enter username" required>

            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="Enter email" required>

            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Create password" required>

            <button type="submit">Register</button>
        </form>
    </div>

</div>

</body>
</html>
